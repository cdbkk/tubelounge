<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0a0b">
    <title>Design Gallery — TV Command Center</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0b; --panel: #121214; --text: #f5f5f4; --muted: #6e6e76; --secondary: #a1a1a8;
        --edge: rgba(255,255,255,0.07); --edge-strong: rgba(255,255,255,0.16); --accent: #ff4d4d;
        font-family: "Plus Jakarta Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); }
      header, main { width: min(1280px, calc(100% - 48px)); margin-inline: auto; }
      header { padding: 40px 0 8px; }
      h1 { margin: 0; font-size: 26px; letter-spacing: -0.02em; font-weight: 800; }
      .sub { margin: 6px 0 0; color: var(--muted); font-size: 13.5px; }
      .sub code { font-family: "JetBrains Mono", monospace; font-size: 12px; }
      main { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; padding: 24px 0 72px; }
      .card {
        position: relative; display: block; overflow: hidden; text-decoration: none; color: inherit;
        background: var(--panel); border: 1px solid var(--edge); border-radius: 14px;
        transition: border-color 140ms ease, transform 120ms ease;
      }
      .card:hover { border-color: var(--edge-strong); transform: translateY(-3px); }
      .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
      .preview { display: block; position: relative; aspect-ratio: 16 / 10.5; overflow: hidden; background: #000; border-bottom: 1px solid var(--edge); }
      .preview iframe {
        position: absolute; top: 0; left: 0; width: 1440px; height: 1620px; border: 0;
        transform-origin: 0 0; pointer-events: none;
        /* scale set inline per card via --s */
        transform: scale(var(--s, 0.2361));
      }
      .preview::after { content: ""; position: absolute; inset: 0; } /* click shield */
      .meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 13px 15px; }
      .name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
      .slug { display: block; margin-top: 2px; color: var(--muted); font-family: "JetBrains Mono", monospace; font-size: 10.5px; }
      .badge { flex: 0 0 auto; padding: 4px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--edge-strong); color: var(--secondary); }
      .badge.live { background: var(--accent); border-color: var(--accent); color: #fff; }
      .badge.codex { color: #7dd3fc; border-color: rgba(125,211,252,0.35); }
      .badge.grok { color: #d8b4fe; border-color: rgba(216,180,254,0.35); }
      .missing { display: grid; place-items: center; position: absolute; inset: 0; color: var(--muted); font-size: 12.5px; background: repeating-linear-gradient(45deg, #0e0e10 0 12px, #101013 12px 24px); }
      @media (prefers-reduced-motion: reduce) { .card { transition: none; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Design Gallery</h1>
      <p class="sub">17 skins, one backend. Every variant is live and functional — click to open, then drive the real TV from it. Previews are scaled live pages.</p>
    </header>
    <main id="grid"></main>
    <script>
      const variants = [
        ["/", "Devl Neutral", "static/ (active)", "live"],
        ["/designs/01-broadcast/", "Broadcast Console", "01-broadcast", "v1"],
        ["/designs/02-oled/", "OLED", "02-oled", "v1"],
        ["/designs/03-hifi/", "Hi-Fi", "03-hifi", "v1"],
        ["/designs/04-terminal/", "Terminal", "04-terminal", "v1"],
        ["/designs/05-living-room/", "Living Room", "05-living-room", "v1"],
        ["/designs/06-neo-brutalist/", "Neo-Brutalist", "06-neo-brutalist", "codex"],
        ["/designs/07-glass/", "Glass", "07-glass", "codex"],
        ["/designs/08-editorial/", "Editorial", "08-editorial", "codex"],
        ["/designs/09-mono-minimal/", "Mono Minimal", "09-mono-minimal", "codex"],
        ["/designs/10-crt/", "CRT Teletext", "10-crt", "codex"],
        ["/designs/11-aurora/", "Aurora", "11-aurora", "codex"],
        ["/designs/12-swiss/", "Swiss Grid", "12-swiss", "codex"],
        ["/designs/13-flight-deck/", "Flight Deck", "13-flight-deck", "codex"],
        ["/designs/14-vaporwave/", "Vaporwave", "14-vaporwave", "grok"],
        ["/designs/15-onyx-gold/", "Onyx & Gold", "15-onyx-gold", "grok"],
        ["/designs/16-candy-dark/", "Candy Dark", "16-candy-dark", "grok"],
        ["/designs/17-nordic-calm/", "Nordic Calm", "17-nordic-calm", "grok"],
      ];
      const grid = document.getElementById("grid");
      for (const [href, name, slug, badge] of variants) {
        const a = document.createElement("a");
        a.className = "card";
        a.href = href;
        a.innerHTML = `
          <span class="preview"><iframe loading="lazy" title="${name} preview"></iframe></span>
          <span class="meta">
            <span><span class="name">${name}</span><span class="slug">${slug}</span></span>
            <span class="badge ${badge}">${badge === "v1" ? "round 1" : badge}</span>
          </span>`;
        const frame = a.querySelector("iframe");
        if (href === "/") { frame.src = href; }
        else {
          // ponytail: probe so unfinished variants show a placeholder instead of a 404 iframe
          fetch(href, { method: "HEAD" }).then((r) => {
            if (r.ok) frame.src = href;
            else frame.insertAdjacentHTML("afterend", '<span class="missing">still rendering…</span>');
          }).catch(() => frame.insertAdjacentHTML("afterend", '<span class="missing">still rendering…</span>'));
        }
        grid.appendChild(a);
      }
      // fit 1440px-wide iframes to actual card width
      const fit = () => document.querySelectorAll(".preview").forEach((p) => p.style.setProperty("--s", (p.clientWidth / 1440).toFixed(4)));
      addEventListener("resize", fit);
      requestAnimationFrame(fit);
    </script>
  </body>
</html>
